asyncapi: '2.0.0'
info:
  title: Simple Messaging API
  version: '1.0.0'
  description: A basic AsyncAPI example
servers:
  production:
    url: broker.example.com
    protocol: mqtt
channels:
  home/temperature:
    description: Temperature readings from the home
    subscribe:
      summary: Receive temperature data
      message:
        contentType: application/json
        payload:
          type: object
          properties:
            temperature:
              type: number
            unit:
              type: string
              enum: [C, F]
